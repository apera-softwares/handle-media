name: Node.js Project `Media Store for VPS` CI with SSDNode

on:
  push:
    branches:
      - "release/**"

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    env:
      PORT: ${{ secrets.PORT }}
      FILEPATH: ${{ secrets.FILEPATH }}
      ACCESS_TOKEN: ${{ secrets.ACCESS_TOKEN }}

    steps:
      # Step 1: Checkout the repository
      - name: Checkout the code
        uses: actions/checkout@v3

      # Step 2: Install SSH dependencies
      - name: Install SSH dependencies
        run: sudo apt-get install -y sshpass

      # Step 3: Deploy to SSDNode
      - name: Deploy to SSDNode
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSDNODE_HOST }}
          username: ${{ secrets.SSDNODE_USERNAME }}
          password: ${{ secrets.SSDNODE_PASSWORD }}
          script: |
            set -e  # Exit on error
            set -x  # Debug mode

            # Update system packages
            sudo apt-get update
            sudo apt-get install -y curl nodejs npm psmisc

            # Add Node.js repository and install latest version
            curl -fsSL https://deb.nodesource.com/setup_16.x | sudo -E bash -
            sudo apt-get install -y nodejs

            # Install PM2 globally with proper permissions
            sudo npm install -g pm2 --unsafe-perm

            # Create the application directory if it doesn't exist
            mkdir -p ~/centralized-media-store
            cd ~/centralized-media-store

            # Pull or clone the repository
            if [ -d ".git" ]; then
              git reset --hard
              git pull origin main
            else
              rm -rf *
              git clone ${{ secrets.REPO_URL }} .
            fi

            # Install project dependencies
            npm install

            # Export environment variables
            export PORT=${{ secrets.PORT }}
            export FILEPATH=${{ secrets.FILEPATH }}
            export ACCESS_TOKEN=${{ secrets.ACCESS_TOKEN }}

            # Kill any process running on the same port (optional)
            fuser -k ${PORT}/tcp || true

            # Start the app with PM2
            pm2 start npm --name "centralized-media-store" -- start

            # Ensure PM2 restarts the app after a server reboot
            pm2 startup ubuntu -u $USER --hp $HOME

            # Save the PM2 process list
            pm2 save

            # Optional: Output PM2 logs for debugging
            pm2 logs centralized-media-store
